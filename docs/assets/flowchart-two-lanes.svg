<svg xmlns="http://www.w3.org/2000/svg" width="720" height="148" viewBox="0 0 720 148" fill="none" role="img" aria-labelledby="t d">
  <title id="t">Two lanes</title>
  <desc id="d">Recovery lane lifecycle and incident lane lifecycle.</desc>
  <style>
    .fg { fill: #1f2328; }
    .muted { fill: #656d76; }
    .line { stroke: #d0d7de; fill: #d0d7de; }
    .node { fill: #ffffff; stroke: #d0d7de; }
    .recFill { fill: #dafbe1; stroke: #1a7f37; }
    .incFill { fill: #fff8c5; stroke: #9a6700; }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #e6edf3; }
      .muted { fill: #8b949e; }
      .line { stroke: #30363d; fill: #30363d; }
      .node { fill: #0d1117; stroke: #30363d; }
      .recFill { fill: #12261e; stroke: #3fb950; }
      .incFill { fill: #2a2111; stroke: #d29922; }
    }
  </style>

  <text class="fg" x="0" y="14" font-size="13" font-weight="600">Recovery</text>
  <text class="muted" x="68" y="14" font-size="12">correct operating behavior</text>

  <g transform="translate(0 28)">
    <rect class="node" width="96" height="30" rx="15" stroke-width="1.25"/>
    <text class="fg" x="48" y="20" text-anchor="middle" font-size="12">candidate</text>
    <path class="line" d="M100 15h20" stroke-width="1.25" fill="none"/>
    <path class="line" d="M118 11l6 4-6 4" stroke="none"/>
    <rect class="recFill" x="128" y="0" width="88" height="30" rx="15" stroke-width="1.5"/>
    <text class="fg" x="172" y="20" text-anchor="middle" font-size="12" font-weight="600">verified</text>
    <path class="line" d="M220 15h20" stroke-width="1.25" fill="none"/>
    <path class="line" d="M238 11l6 4-6 4" stroke="none"/>
    <rect class="node" x="248" y="0" width="72" height="30" rx="15" stroke-width="1.25"/>
    <text class="fg" x="284" y="20" text-anchor="middle" font-size="12">stale</text>
    <path class="line" d="M324 15h20" stroke-width="1.25" fill="none"/>
    <path class="line" d="M342 11l6 4-6 4" stroke="none"/>
    <rect class="node" x="352" y="0" width="80" height="30" rx="15" stroke-width="1.25"/>
    <text class="fg" x="392" y="20" text-anchor="middle" font-size="12">retired</text>
  </g>
  <text class="muted" x="0" y="78" font-size="11">.loopcompass/recoveries/</text>

  <text class="fg" x="0" y="108" font-size="13" font-weight="600">Incident</text>
  <text class="muted" x="60" y="108" font-size="12">broken normal path</text>

  <g transform="translate(0 118)">
    <rect class="node" width="88" height="30" rx="15" stroke-width="1.25"/>
    <text class="fg" x="44" y="20" text-anchor="middle" font-size="12">detected</text>
    <path class="line" d="M92 15h16" stroke-width="1.25" fill="none"/>
    <path class="line" d="M106 11l6 4-6 4" stroke="none"/>
    <rect class="node" x="116" y="0" width="92" height="30" rx="15" stroke-width="1.25"/>
    <text class="fg" x="162" y="20" text-anchor="middle" font-size="12">escalated</text>
    <path class="line" d="M212 15h16" stroke-width="1.25" fill="none"/>
    <path class="line" d="M226 11l6 4-6 4" stroke="none"/>
    <rect class="incFill" x="236" y="0" width="92" height="30" rx="15" stroke-width="1.5"/>
    <text class="fg" x="282" y="20" text-anchor="middle" font-size="12" font-weight="600">repairing</text>
    <path class="line" d="M332 15h16" stroke-width="1.25" fill="none"/>
    <path class="line" d="M346 11l6 4-6 4" stroke="none"/>
    <rect class="node" x="356" y="0" width="100" height="30" rx="15" stroke-width="1.25"/>
    <text class="fg" x="406" y="20" text-anchor="middle" font-size="12">verified out</text>
  </g>
</svg>
