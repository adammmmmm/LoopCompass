<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">LoopCompass two lanes</title>
  <desc id="desc">Recovery lane preserves verified operating knowledge. Incident lane repairs broken mechanisms.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1020"/>
      <stop offset="100%" stop-color="#0E1830"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F3D88A"/>
      <stop offset="100%" stop-color="#C9A24A"/>
    </linearGradient>
    <marker id="aC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#5EEAD4"/>
    </marker>
    <marker id="aG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#F3D88A"/>
    </marker>
    <style>
      .label { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .kicker { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; fill: #6B7C96; }
      .title { font-size: 28px; font-weight: 700; fill: #F5F7FB; letter-spacing: -0.02em; }
      .sub { font-size: 13px; fill: #8B9BB4; }
      .lane { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; }
      .h { font-size: 14px; font-weight: 600; fill: #E8EEF7; }
      .p { font-size: 11px; fill: #8B9BB4; }
      .node { font-size: 12px; font-weight: 600; fill: #E8EEF7; }
    </style>
  </defs>

  <rect width="1120" height="420" rx="28" fill="url(#bg)"/>

  <text class="label kicker" x="56" y="48">TWO OUTCOMES</text>
  <text class="label title" x="56" y="82">Knowledge or repair. Never folklore.</text>
  <text class="label sub" x="56" y="108">Every verified resolution lands in exactly one lane.</text>

  <!-- Recovery lane -->
  <rect x="56" y="148" width="488" height="220" rx="20" fill="#101827" stroke="#1E3A36"/>
  <rect x="56" y="148" width="6" height="220" rx="3" fill="url(#cyan)"/>
  <text class="label lane" x="88" y="184" fill="#5EEAD4">RECOVERY LANE</text>
  <text class="label h" x="88" y="212">Correct operating behavior</text>
  <text class="label p" x="88" y="234">Legitimate tool use and real external constraints</text>

  <!-- lifecycle nodes -->
  <rect x="88" y="268" width="90" height="40" rx="20" fill="#121A2B" stroke="#2A4A44"/>
  <text class="label node" x="133" y="293" text-anchor="middle">candidate</text>
  <line x1="178" y1="288" x2="204" y2="288" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#aC)"/>
  <rect x="208" y="268" width="90" height="40" rx="20" fill="#121A2B" stroke="#5EEAD4"/>
  <text class="label node" x="253" y="293" text-anchor="middle">verified</text>
  <line x1="298" y1="288" x2="324" y2="288" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#aC)"/>
  <rect x="328" y="268" width="70" height="40" rx="20" fill="#121A2B" stroke="#2A4A44"/>
  <text class="label node" x="363" y="293" text-anchor="middle">stale</text>
  <line x1="398" y1="288" x2="424" y2="288" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#aC)"/>
  <rect x="428" y="268" width="88" height="40" rx="20" fill="#121A2B" stroke="#2A4A44"/>
  <text class="label node" x="472" y="293" text-anchor="middle">retired</text>

  <text class="label p" x="88" y="340">Stored under .loopcompass/recoveries/</text>

  <!-- Incident lane -->
  <rect x="576" y="148" width="488" height="220" rx="20" fill="#101827" stroke="#3A3426"/>
  <rect x="576" y="148" width="6" height="220" rx="3" fill="url(#gold)"/>
  <text class="label lane" x="608" y="184" fill="#F3D88A">INCIDENT LANE</text>
  <text class="label h" x="608" y="212">Broken normal path</text>
  <text class="label p" x="608" y="234">Permissions, config, wrappers, workflows, CI</text>

  <rect x="608" y="268" width="82" height="40" rx="20" fill="#121A2B" stroke="#4A3F28"/>
  <text class="label node" x="649" y="293" text-anchor="middle">detected</text>
  <line x1="690" y1="288" x2="708" y2="288" stroke="#F3D88A" stroke-width="1.5" marker-end="url(#aG)"/>
  <rect x="712" y="268" width="88" height="40" rx="20" fill="#121A2B" stroke="#4A3F28"/>
  <text class="label node" x="756" y="293" text-anchor="middle">escalated</text>
  <line x1="800" y1="288" x2="818" y2="288" stroke="#F3D88A" stroke-width="1.5" marker-end="url(#aG)"/>
  <rect x="822" y="268" width="82" height="40" rx="20" fill="#121A2B" stroke="#F3D88A"/>
  <text class="label node" x="863" y="293" text-anchor="middle">repairing</text>
  <line x1="904" y1="288" x2="922" y2="288" stroke="#F3D88A" stroke-width="1.5" marker-end="url(#aG)"/>
  <rect x="926" y="268" width="100" height="40" rx="20" fill="#121A2B" stroke="#4A3F28"/>
  <text class="label node" x="976" y="293" text-anchor="middle">verified out</text>

  <text class="label p" x="608" y="340">Live files under .loopcompass/incidents/ delete on close</text>
</svg>
