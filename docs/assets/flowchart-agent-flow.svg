<svg xmlns="http://www.w3.org/2000/svg" width="720" height="132" viewBox="0 0 760 132" fill="none" role="img" aria-labelledby="t d">
  <title id="t">Automatic agent flow</title>
  <desc id="d">Failure, consult once, retrieve, act, verify.</desc>
  <style>
    .fg { fill: #1f2328; }
    .muted { fill: #656d76; }
    .line { stroke: #d0d7de; }
    .ring { fill: #ffffff; stroke: #d0d7de; }
    .ringA { fill: #ddf4ff; stroke: #0969da; }
    .ringB { fill: #fff8c5; stroke: #9a6700; }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #e6edf3; }
      .muted { fill: #8b949e; }
      .line { stroke: #30363d; }
      .ring { fill: #0d1117; stroke: #30363d; }
      .ringA { fill: #121d2f; stroke: #2f81f7; }
      .ringB { fill: #2a2111; stroke: #d29922; }
    }
  </style>

  <!-- spine -->
  <path class="line" d="M76 36H684" stroke-width="1.25"/>

  <!-- 01 -->
  <circle class="ringA" cx="76" cy="36" r="18" stroke-width="1.5"/>
  <text class="fg" x="76" y="40" text-anchor="middle" font-size="12" font-weight="600">1</text>
  <text class="fg" x="76" y="78" text-anchor="middle" font-size="13" font-weight="600">Failure</text>
  <text class="muted" x="76" y="96" text-anchor="middle" font-size="11">deterministic or</text>
  <text class="muted" x="76" y="112" text-anchor="middle" font-size="11">repeated transient</text>

  <!-- 02 -->
  <circle class="ringA" cx="228" cy="36" r="18" stroke-width="1.5"/>
  <text class="fg" x="228" y="40" text-anchor="middle" font-size="12" font-weight="600">2</text>
  <text class="fg" x="228" y="78" text-anchor="middle" font-size="13" font-weight="600">Consult once</text>
  <text class="muted" x="228" y="96" text-anchor="middle" font-size="11">before blind retry</text>
  <text class="muted" x="228" y="112" text-anchor="middle" font-size="11">or bypass</text>

  <!-- 03 -->
  <circle class="ringA" cx="380" cy="36" r="18" stroke-width="1.5"/>
  <text class="fg" x="380" y="40" text-anchor="middle" font-size="12" font-weight="600">3</text>
  <text class="fg" x="380" y="78" text-anchor="middle" font-size="13" font-weight="600">Retrieve</text>
  <text class="muted" x="380" y="96" text-anchor="middle" font-size="11">skill or direct</text>
  <text class="muted" x="380" y="112" text-anchor="middle" font-size="11">.loopcompass search</text>

  <!-- 04 -->
  <circle class="ringB" cx="532" cy="36" r="18" stroke-width="1.5"/>
  <text class="fg" x="532" y="40" text-anchor="middle" font-size="12" font-weight="600">4</text>
  <text class="fg" x="532" y="78" text-anchor="middle" font-size="13" font-weight="600">Act</text>
  <text class="muted" x="532" y="96" text-anchor="middle" font-size="11">apply recovery or</text>
  <text class="muted" x="532" y="112" text-anchor="middle" font-size="11">repair and escalate</text>

  <!-- 05 -->
  <circle class="ringB" cx="684" cy="36" r="18" stroke-width="1.5"/>
  <text class="fg" x="684" y="40" text-anchor="middle" font-size="12" font-weight="600">5</text>
  <text class="fg" x="684" y="78" text-anchor="middle" font-size="13" font-weight="600">Verify</text>
  <text class="muted" x="684" y="96" text-anchor="middle" font-size="11">confirm intended path</text>
  <text class="muted" x="684" y="112" text-anchor="middle" font-size="11">and resume</text>
</svg>
