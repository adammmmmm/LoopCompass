<svg xmlns="http://www.w3.org/2000/svg" width="480" height="96" viewBox="0 0 480 96" fill="none" role="img" aria-labelledby="t d">
  <title id="t">LoopCompass</title>
  <desc id="d">LoopCompass logo: geometric compass mark and wordmark.</desc>
  <style>
    .ring { stroke: #1f2328; }
    .tick { stroke: #1f2328; }
    .needle { fill: #0969da; }
    .hub { fill: #1f2328; }
    .word { fill: #1f2328; }
    .tag { fill: #656d76; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #e6edf3; }
      .tick { stroke: #e6edf3; }
      .needle { fill: #58a6ff; }
      .hub { fill: #e6edf3; }
      .word { fill: #e6edf3; }
      .tag { fill: #8b949e; }
    }
  </style>

  <!-- Mark -->
  <g transform="translate(8 8)">
    <circle class="ring" cx="40" cy="40" r="36" stroke-width="1.5" fill="none"/>
    <circle class="ring" cx="40" cy="40" r="28" stroke-width="1" fill="none" opacity="0.45"/>
    <!-- cardinal ticks -->
    <path class="tick" d="M40 6v8M40 66v8M6 40h8M66 40h8" stroke-width="1.5" stroke-linecap="round"/>
    <!-- intercardinal ticks -->
    <path class="tick" d="M15.3 15.3l5.7 5.7M59 59l5.7 5.7M64.7 15.3l-5.7 5.7M21 59l-5.7 5.7" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <!-- needle -->
    <path class="needle" d="M40 14 L46 40 L40 66 L34 40 Z" opacity="0.95"/>
    <circle class="hub" cx="40" cy="40" r="3.5"/>
    <!-- subtle orbit loop -->
    <path class="ring" d="M12 28c8-18 48-18 56 0" stroke-width="1" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path class="ring" d="M12 52c8 18 48 18 56 0" stroke-width="1" fill="none" opacity="0.35" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text class="word" x="108" y="52" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="650" letter-spacing="-0.03em">LoopCompass</text>
  <text class="tag" x="110" y="74" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" letter-spacing="0.04em">REMEMBER THE PATH · REPAIR THE REST</text>
</svg>
