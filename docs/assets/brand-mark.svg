<svg xmlns="http://www.w3.org/2000/svg" width="320" height="56" viewBox="0 0 320 56" fill="none" role="img" aria-labelledby="t d">
  <title id="t">LoopCompass</title>
  <desc id="d">LoopCompass logo: an open loop with a compass needle pointing out through the gap, and wordmark.</desc>
  <style>
    .loop { stroke: #1f2328; }
    .needleS { fill: #59636e; opacity: 0.4; }
    .needleN { fill: url(#ngl); }
    .hub { fill: #1f2328; }
    .word { fill: #1f2328; }
    @media (prefers-color-scheme: dark) {
      .loop { stroke: #e6edf3; }
      .needleS { fill: #9198a1; opacity: 0.45; }
      .needleN { fill: url(#ngd); }
      .hub { fill: #e6edf3; }
      .word { fill: #e6edf3; }
    }
  </style>
  <defs>
    <linearGradient id="ngl" x1="24" y1="3.5" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891b2"/><stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="ngd" x1="24" y1="3.5" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <g transform="translate(2 4) rotate(34 24 24)">
    <path class="loop" d="M30.51 9.38A16 16 0 1 1 17.49 9.38" stroke-width="3" stroke-linecap="round"/>
    <path class="needleN" d="M24 3.5L28 24H20Z"/>
    <path class="needleS" d="M24 36.5L28 24H20Z"/>
    <circle class="hub" cx="24" cy="24" r="1.9"/>
  </g>

  <text class="word" x="62" y="37" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="27" letter-spacing="-0.02em"><tspan font-weight="500">Loop</tspan><tspan font-weight="700">Compass</tspan></text>
</svg>
