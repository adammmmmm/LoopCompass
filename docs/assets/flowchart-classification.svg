<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">LoopCompass classification gate</title>
  <desc id="desc">Failure leads to retrieval, then classification into recovery, incident, external containment, or nothing preserved.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1020"/>
      <stop offset="55%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0E1830"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3D88A"/>
      <stop offset="100%" stop-color="#C9A24A"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8.5 5 L 0 8.5 z" fill="#6B7C96"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8.5 5 L 0 8.5 z" fill="#D4B46A"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8.5 5 L 0 8.5 z" fill="#5EEAD4"/>
    </marker>
    <style>
      .label { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .title { font-size: 13px; font-weight: 600; fill: #E8EEF7; letter-spacing: 0.02em; }
      .sub { font-size: 11px; font-weight: 400; fill: #8B9BB4; }
      .kicker { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; fill: #6B7C96; }
      .chip { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1120" height="720" rx="28" fill="url(#bg)"/>
  <circle cx="160" cy="120" r="120" fill="#5EEAD4" opacity="0.04"/>
  <circle cx="980" cy="600" r="160" fill="#F3D88A" opacity="0.04"/>

  <text class="label kicker" x="56" y="52">HOW IT WORKS</text>
  <text class="label" x="56" y="82" style="font-size:28px;font-weight:700;fill:#F5F7FB;letter-spacing:-0.02em;">The classification gate</text>
  <text class="label sub" x="56" y="108">Retrieve first. Classify second. Preserve only what earns a place in the repository.</text>

  <!-- Start node -->
  <g filter="url(#soft)">
    <rect x="430" y="140" width="260" height="64" rx="32" fill="#151E31" stroke="url(#gold)" stroke-width="1.5"/>
  </g>
  <text class="label title" x="560" y="178" text-anchor="middle">Unexpected failure</text>

  <line x1="560" y1="204" x2="560" y2="244" stroke="#6B7C96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Retrieve -->
  <rect x="390" y="244" width="340" height="72" rx="16" fill="#121A2B" stroke="#243149" stroke-width="1.5"/>
  <text class="label chip" x="560" y="272" text-anchor="middle" fill="#5EEAD4">STEP 01</text>
  <text class="label title" x="560" y="296" text-anchor="middle">Retrieve repository knowledge</text>

  <line x1="560" y1="316" x2="560" y2="356" stroke="#6B7C96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Classify -->
  <rect x="390" y="356" width="340" height="72" rx="16" fill="#121A2B" stroke="#243149" stroke-width="1.5"/>
  <text class="label chip" x="560" y="384" text-anchor="middle" fill="#F3D88A">STEP 02</text>
  <text class="label title" x="560" y="408" text-anchor="middle">Classify the failure</text>

  <!-- Branch lines -->
  <path d="M560 428 V458 H180 V486" fill="none" stroke="#6B7C96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M560 428 V458 H420 V486" fill="none" stroke="#6B7C96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M560 428 V458 H700 V486" fill="none" stroke="#6B7C96" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M560 428 V458 H940 V486" fill="none" stroke="#6B7C96" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Outcome cards -->
  <!-- Recovery -->
  <rect x="56" y="486" width="248" height="168" rx="18" fill="#101827" stroke="#2A3F3A" stroke-width="1.5"/>
  <rect x="56" y="486" width="248" height="6" rx="3" fill="url(#cyan)"/>
  <text class="label chip" x="180" y="524" text-anchor="middle" fill="#5EEAD4">RECOVERY</text>
  <text class="label title" x="180" y="556" text-anchor="middle">Correct behavior</text>
  <text class="label sub" x="180" y="584" text-anchor="middle">Verify the path, keep a</text>
  <text class="label sub" x="180" y="602" text-anchor="middle">concise recovery capsule.</text>
  <text class="label" x="180" y="632" text-anchor="middle" style="font-size:12px;font-weight:600;fill:#5EEAD4;">Survives as knowledge</text>

  <!-- Incident -->
  <rect x="296" y="486" width="248" height="168" rx="18" fill="#101827" stroke="#3A3426" stroke-width="1.5"/>
  <rect x="296" y="486" width="248" height="6" rx="3" fill="url(#gold)"/>
  <text class="label chip" x="420" y="524" text-anchor="middle" fill="#F3D88A">INCIDENT</text>
  <text class="label title" x="420" y="556" text-anchor="middle">Repairable defect</text>
  <text class="label sub" x="420" y="584" text-anchor="middle">Escalate, repair, verify</text>
  <text class="label sub" x="420" y="602" text-anchor="middle">the normal path, close.</text>
  <text class="label" x="420" y="632" text-anchor="middle" style="font-size:12px;font-weight:600;fill:#F3D88A;">Survives as a closed fix</text>

  <!-- External -->
  <rect x="536" y="486" width="248" height="168" rx="18" fill="#101827" stroke="#2A3344" stroke-width="1.5"/>
  <rect x="536" y="486" width="248" height="6" rx="3" fill="#7DD3FC"/>
  <text class="label chip" x="660" y="524" text-anchor="middle" fill="#7DD3FC">EXTERNAL</text>
  <text class="label title" x="660" y="556" text-anchor="middle">Upstream defect</text>
  <text class="label sub" x="660" y="584" text-anchor="middle">Track expiring containment</text>
  <text class="label sub" x="660" y="602" text-anchor="middle">until repair is possible.</text>
  <text class="label" x="660" y="632" text-anchor="middle" style="font-size:12px;font-weight:600;fill:#7DD3FC;">Survives with an expiry</text>

  <!-- Nothing -->
  <rect x="776" y="486" width="288" height="168" rx="18" fill="#101827" stroke="#2A2F3A" stroke-width="1.5"/>
  <rect x="776" y="486" width="288" height="6" rx="3" fill="#64748B"/>
  <text class="label chip" x="920" y="524" text-anchor="middle" fill="#94A3B8">NO ARTIFACT</text>
  <text class="label title" x="920" y="556" text-anchor="middle">Bypass or coincidence</text>
  <text class="label sub" x="920" y="584" text-anchor="middle">Clever workarounds and</text>
  <text class="label sub" x="920" y="602" text-anchor="middle">lucky exits are discarded.</text>
  <text class="label" x="920" y="632" text-anchor="middle" style="font-size:12px;font-weight:600;fill:#94A3B8;">Preserves nothing</text>
</svg>
