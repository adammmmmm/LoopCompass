name: verify

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify (tests + release inventory)
        run: node scripts/verify.mjs

  release-package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Release pin status
        # Source-tree manifest.commit may lag the tag commit by one generate cycle.
        # package rewrites the archived manifest.commit to HEAD (the tag SHA).
        run: node scripts/release.mjs pin-check
      - name: Package release archive
        run: node scripts/release.mjs package
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loopcompass-release-dist
          path: |
            dist/loopcompass-v*.tar.gz
            dist/SHA256SUMS
